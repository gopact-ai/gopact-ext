name: admin-automerge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for admin-authored PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          draft="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.draft')"
          if [[ "${draft}" == "true" ]]; then
            echo "Draft PR: auto-merge skipped."
            exit 0
          fi

          author="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.user.login')"
          permission="$(gh api "repos/${REPO}/collaborators/${author}/permission" --jq '.permission' 2>/dev/null || echo none)"
          if [[ "${permission}" != "admin" ]]; then
            echo "Non-admin-authored PR: auto-merge skipped."
            exit 0
          fi

          gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --squash --delete-branch

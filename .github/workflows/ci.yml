name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/gopact-ext
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: source/gopact-ext
      - name: reject private development documents
        shell: bash
        run: |
          files=$(git ls-files 'doc/**' 'docs/**')
          test -z "$files" || {
            printf 'private development documents are tracked:\n%s\n' "$files"
            exit 1
          }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.27.0-rc.2'
          cache-dependency-path: |
            source/gopact-ext/**/go.sum
            source/gopact-ext/go.work.sum
      - run: make fmt-check module-contract tidy test race vet standalone published
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: make security
      - name: optional provider smoke
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: make integration

  database-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: source/gopact-ext/stores
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gopact
          MYSQL_USER: gopact
          MYSQL_PASSWORD: gopact
        ports:
          - 33060:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: gopact
          MARIADB_USER: gopact
          MARIADB_PASSWORD: gopact
        ports:
          - 33061:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gopact
          POSTGRES_USER: gopact
          POSTGRES_PASSWORD: gopact
        ports:
          - 54320:5432
        options: >-
          --health-cmd "pg_isready -U gopact -d gopact"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      GOPACT_TEST_MYSQL_DSN: "gopact:gopact@tcp(127.0.0.1:33060)/gopact?charset=utf8mb4&parseTime=true&loc=UTC"
      GOPACT_TEST_MARIADB_DSN: "gopact:gopact@tcp(127.0.0.1:33061)/gopact?charset=utf8mb4&parseTime=true&loc=UTC"
      GOPACT_TEST_POSTGRES_DSN: "host=127.0.0.1 port=54320 user=gopact password=gopact dbname=gopact sslmode=disable TimeZone=UTC"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: source/gopact-ext
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.27.0-rc.2'
          cache-dependency-path: source/gopact-ext/stores/go.sum
      - run: make dbintegration
        working-directory: source/gopact-ext

  source-compatibility:
    uses: gopact-ai/gopact-examples/.github/workflows/source-compatibility.yml@863fe4d78da1c27b2f767cf01a6e5438cef9fc50
    with:
      core_ref: main
      ext_ref: ${{ github.sha }}
      examples_ref: main

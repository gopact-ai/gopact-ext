name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/gopact-ext
    steps:
      - uses: actions/checkout@v7
        with:
          path: source/gopact-ext
      - name: reject private development documents
        shell: bash
        run: |
          files=$(git ls-files 'doc/**' 'docs/**')
          test -z "$files" || {
            printf 'private development documents are tracked:\n%s\n' "$files"
            exit 1
          }
      - uses: actions/checkout@v7
        with:
          repository: gopact-ai/gopact
          path: source/gopact
      - uses: actions/setup-go@v6
        with:
          go-version: '1.27.0-rc.2'
          cache-dependency-path: source/gopact-ext/go.work.sum
      - run: make fmt-check tidy
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: make test race vet security
      - name: integration
        if: github.event_name != 'pull_request'
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: make integration

name: ci

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/gopact-ai/*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: '**/go.sum'
      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Configure private core access
        run: |
          if [ -n "${GOPACT_GITHUB_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GOPACT_GITHUB_TOKEN}@github.com/gopact-ai/".insteadOf "https://github.com/gopact-ai/"
          fi
        env:
          GOPACT_GITHUB_TOKEN: ${{ secrets.GOPACT_GITHUB_TOKEN || github.token }}
      - name: Check whitespace
        run: git diff --check
      - name: Check module tidiness
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && go mod tidy)
          done
          git diff --exit-code
      - name: Test modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && go test -count=1 ./...)
          done
      - name: Race modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && go test -race -count=1 ./...)
          done
      - name: Vet modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && go vet ./...)
          done
      - name: Lint modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && golangci-lint run ./...)
          done
      - name: Coverage modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && go test -coverprofile=coverage.out ./...)
          done
      - name: Security modules
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort); do
            (cd "$mod" && govulncheck ./...)
          done
